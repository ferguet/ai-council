# Blueprint de despliegue para Render (plan gratuito).
#
# Al conectar este repositorio en Render, elige "New > Blueprint" y Render
# detecta este fichero solo. Las variables marcadas con "sync: false" hay
# que rellenarlas a mano en el panel de Render (nunca se suben a GitHub).
services:
  - type: web
    name: ai-council
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Fija la version de Python: sin esto Render usa una demasiado nueva
      # (3.14) para la que pydantic-core todavia no tiene wheel precompilada,
      # y falla al intentar compilarla desde codigo fuente en el build.
      - key: PYTHON_VERSION
        value: "3.11.9"

      # Claves de proveedores de IA - opcional, sin ellas esos ciudadanos
      # usan texto simulado en vez de llamadas reales.
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GLM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false

      # Cadena de conexion a Postgres (Supabase). Imprescindible para que la
      # ciudad no se resetee cada vez que Render duerme el servicio.
      - key: DATABASE_URL
        sync: false

      # Puerta de entrada: la clave que reparte Fran a mano a quien quiere
      # que use la app. Sin esto configurado, la app queda abierta a
      # cualquiera con el enlace (util solo en local). Cambiarla en
      # cualquier momento corta el paso a todo el mundo que ya tenia clave
      # antigua, sin tocar codigo.
      - key: ACCESS_CODE
        sync: false

      # Director del debate
      - key: DIRECTOR_PROVIDER
        value: mock
      - key: DIRECTOR_MODEL
        value: director-v1
      - key: MAX_DEBATE_TURNS
        value: "20"

      # Ciudad Virtual: cada tick = 1 hora simulada; llamada real de
      # "pensamiento" como maximo cada 15 min reales por ciudadano.
      - key: SIM_TICK_SECONDS
        value: "60"
      - key: SIM_HOURS_PER_TICK
        value: "1"
      - key: SIM_REAL_AI_INTERVAL_MINUTES
        value: "15"
      - key: SIM_AUTOSTART
        value: "true"
